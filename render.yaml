services:
  - type: web
    name: india-market-analysis
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # SQLAlchemy MySQL URL for JSON persistence, e.g.
      # mysql+pymysql://user:pass@host:3306/market_intelligence  (set in dashboard).
      # If unset/unreachable the app falls back to a local JSON cache.
      - key: MYSQL_URL
        sync: false
      - key: PREMARKET_TTL_MIN
        value: "15"
      - key: SCREEN_TTL_HOURS
        value: "12"

# Pre-open refresh is handled by an external pinger (GitHub Actions:
# .github/workflows/premarket-refresh.yml) which POSTs /api/refresh before
# the NSE open — no paid Render cron service required.
